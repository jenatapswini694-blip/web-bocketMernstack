<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css units</title>
    <style>
       #parent{
        background-color: antiquewhite;
        width: 40%;
        font-size: 30px;
       }
       h1{
        font-size: 1em;
        /*1em=30px */ 
        /*1rem=16px*/
       }
       h2{
        font-size: 2em;
        /*2em=60px */ 
        /*2rem=32px*/
       }
       h3{
        font-size: 1.5em;
        /* 1.5em=45px*/ 
        /*1.5rem=24px*/
       }
    </style>
</head>
<body>
    <div id="parent">
        <h1>hello today is a good day</h1>
        <h2>hello my name is good</h2>
        <h3>today we will learn css</h3>
    </div>
</body>
</html>
