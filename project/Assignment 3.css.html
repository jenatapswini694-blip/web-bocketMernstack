<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css Selectors</title>
    <style>/*id selector*/
          h1{
        color:red;
        background-color:green;
    }
    .demo{
        color:purple;
        background-color:bisque;
    }
     /*group selector*/
      h1,h3,p{
            color:pink;
            background-color:paleturquoise;
        }
        
    </style>
</head>
<body>
    <h1 id="nit">today is a good day</h1>
    <h1>today is agood day</h1>
    <!--id selector-->
    
    <h1>today is agood day</h1>
    
</body>
</html>
